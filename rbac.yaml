apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-user
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: dev-user
  namespace: default
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io


#Test the permission:
# kubectl auth can-i get pods --as=system:serviceaccount:default:dev-user
# kubectl auth can-i delete pods --as=system:serviceaccount:default:dev-user
# kubectl auth can-i get secrets --as=system:serviceaccount:default:dev-user